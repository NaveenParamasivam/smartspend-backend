# Test configuration - uses H2 in-memory DB
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT
app.jwt.secret=TestSecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmTestOnly2024
app.jwt.expiration=86400000

# Mail — dummy values; JavaMailSender is @MockBean in tests so no real connection is made
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Frontend URL
app.frontend.url=http://localhost:3000
app.mail.from=test@test.com
app.mail.from-name=SmartSpend Test
app.cors.allowed-origins=http://localhost:3000
app.verification.token-expiry=24
app.password-reset.token-expiry=1
