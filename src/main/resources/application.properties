# ============================================================
#  SmartSpend — Application Configuration
#  All sensitive values come from environment variables.
#  Set them in .env (local) or your cloud provider's secrets.
# ============================================================

# ── Server ───────────────────────────────────────────────────
server.port=${SERVER_PORT}
server.servlet.context-path=/api

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ── Mail ─────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.enable=true
app.mail.from=${MAIL_FROM}
app.mail.from-name=SmartSpend
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── URLs ─────────────────────────────────────────────────────
app.frontend.url=${FRONTEND_URL}
app.cors.allowed-origins=${CORS_ORIGINS}

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Token Expiry (hours) ─────────────────────────────────────
app.verification.token-expiry=24
app.password-reset.token-expiry=1

# ── Logging ──────────────────────────────────────────────────
logging.level.com.smartspend=INFO
logging.level.org.springframework.security=WARN
